name: Tests

on:
  push:
    branches: [ dev ]
  pull_request:
    branches:
     - dev
     - main

jobs:
  lint:
    name: Lint (clang-tidy + warnings)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang clang-tidy clang-format

    - name: Configure (export compile commands)
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

    - name: Run clang-tidy
      run: |
        FILES=$(find . -name '*.cpp' -o -name '*.hpp' -o -name '*.h')
        clang-tidy $FILES \
          -p build \
          --warnings-as-errors='*'

    - name: Check formatting
      run: |
        FILES=$(find . -name '*.cpp' -o -name '*.hpp' -o -name '*.h')
        clang-format --dry-run --Werror $FILES

    - name: Lint summary
      if: always()
      run: |
        STATUS="❌ Failed"
        [ "${{ job.status }}" = "success" ] && STATUS="✅ Passed"

        {
          echo "## 🔎 Lint"
          echo ""
          echo "- Status: **$STATUS**"
          echo "- Checks: clang-tidy + clang-format + -Werror"
        } >> $GITHUB_STEP_SUMMARY

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++

    - name: Configure
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: |
        cmake --build build -j4

    - name: Run tests
      run: |
        cd build/tests
        ./wiseio_tests --gtest_output=xml:test_results.xml

    - name: Unit test summary
      if: always()
      run: |
        XML=build/tests/test_results.xml

        if [ -f "$XML" ]; then
          TOTAL=$(grep -o 'tests="[0-9]*"' "$XML" | head -1 | grep -o '[0-9]*')
          FAIL=$(grep -o 'failures="[0-9]*"' "$XML" | head -1 | grep -o '[0-9]*')
        else
          TOTAL="?"
          FAIL="?"
        fi

        STATUS="❌ Failed"
        [ "${{ job.status }}" = "success" ] && STATUS="✅ Passed"

        {
          echo "## 🧪 WiseIO – Unit Tests"
          echo ""
          echo "| Metric | Value |"
          echo "|-------|-------|"
          echo "| Status | $STATUS |"
          echo "| Total tests | $TOTAL |"
          echo "| Failures | $FAIL |"
        } >> $GITHUB_STEP_SUMMARY

  san:
    name: AddressSanitizer
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++

    - name: Configure (ASan)
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

    - name: Build
      run: |
        cmake --build build -j4

    - name: Run tests (ASan)
      run: |
        cd build/tests
        ./wiseio_tests

    - name: ASan summary
      if: always()
      run: |
        STATUS="❌ Failed"
        [ "${{ job.status }}" = "success" ] && STATUS="✅ Passed"

        {
          echo "## 🧨 AddressSanitizer"
          echo ""
          echo "- Status: **$STATUS**"
        } >> $GITHUB_STEP_SUMMARY
